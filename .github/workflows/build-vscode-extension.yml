name: Build VSCode Extension

# Triggered when code is merged into main, plus a manual dispatch option.
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Package VSIX
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile extension (TypeScript → out/)
        run: pnpm --filter write-ai-prompt-better run build

      - name: Package VSIX
        working-directory: apps/vscode-extension
        # --no-dependencies: the extension has no runtime dependencies, so skip
        #   dependency resolution (avoids issues with pnpm's symlinked node_modules).
        run: npx --yes @vscode/vsce package --no-dependencies --allow-missing-repository

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v6
        with:
          name: write-ai-prompt-better-vsix
          path: apps/vscode-extension/*.vsix
          if-no-files-found: error
          retention-days: 90

      - name: Publish to GitHub Releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(jq -r '.version' apps/vscode-extension/package.json)
          TAG="v${VERSION}"
          VSIX=$(ls apps/vscode-extension/*.vsix | head -1)
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists, uploading asset..."
            gh release upload "$TAG" "$VSIX" --clobber
          else
            echo "Creating release $TAG..."
            gh release create "$TAG" "$VSIX" \
              --title "v${VERSION}" \
              --generate-notes
          fi
