# Cloudflare Pages configuration
# Git-integrated deploys via Cloudflare Dashboard: build command / root dir / output dir
# are configured in the Dashboard UI, not in this file.
#
# CLI deploy: pnpm build && wrangler pages deploy dist --project-name=write-ai-prompt-better
#
# This file is used when Cloudflare Pages CI runs `npx wrangler deploy`.
# It tells Wrangler that this is an assets-only (static site) deployment.

name = "write-ai-prompt-better-website"
compatibility_date = "2026-06-19"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"
